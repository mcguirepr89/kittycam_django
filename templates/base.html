{% load static %}
<!doctype html>
<html lang="en" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}KittyCam{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
    <link rel="manifest" href="{% static 'manifest.webmanifest' %}">

    <meta name="theme-color" content="#0f172a">
    
    <!-- iOS PWA support -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KittyCam">
    <link rel="icon" type="image/png" href="/static/icons/192.png">
    <link rel="apple-touch-icon" href="{% static 'icons/180.png' %}">
    <link rel="apple-touch-icon" sizes="152x152" href="/static/icons/152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/180.png">
    <link rel="apple-touch-icon" sizes="167x167" href="/static/icons/167.png">
</head>
<body class="flex flex-col h-full font-sans antialiased text-slate-800">

    <!-- Top Navigation Bar -->
    <nav class="bg-slate-900 shadow-md">
        <div class="max-w-6xl px-4 mx-auto">
            <div class="flex items-center justify-between h-16">
                
                <!-- Logo / Brand -->
                <div class="flex-shrink-0">
                    <a href="/" class="text-xl font-bold tracking-wider text-white hover:text-indigo-400 transition-colors">
                        🐱 KittyCam
                    </a>
                </div>

                <!-- Navigation Links -->
                <div class="flex items-center space-x-6">
                    {% if user.is_authenticated %}
                    <a href="{% url 'dashboard' %}" class="px-3 py-2 text-sm font-medium text-slate-300 rounded-md hover:text-white hover:bg-slate-800 transition-all">
                        Dashboard
                    </a>

                    <form method="post" action="{% url 'logout' %}" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-lg shadow-sm hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-slate-900 transition-all cursor-pointer">
                            Logout
                        </button>
                    </form>
                    {% endif %}
                </div>

            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-grow w-full">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Simple Footer -->
    <footer class="py-4 text-center text-xs text-slate-400 bg-slate-100 border-t border-slate-200 mt-auto">
        <p>&copy; {% now "Y" %} KittyCam by Patrick McGuire. All rights reserved.</p>
    </footer>

    <script>
    if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
            navigator.serviceWorker.register("{% static 'sw.js' %}")
                .then(function (registration) {
                    console.log("SW registered:", registration.scope);
                })
                .catch(function (error) {
                    console.log("SW registration failed:", error);
                });
        });
    }
    </script>
</body>
</html>
